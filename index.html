<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EncyClaupedia - Encyclopédie des Outils IA</title>
    <meta name="description" content="Compilation curatée d'outils, tips et frameworks pour Claude Code et l'écosystème IA.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="fr_FR">
    <meta property="og:site_name" content="EncyClaupedia">
    <meta property="og:title" content="EncyClaupedia - Encyclopédie des Outils IA">
    <meta property="og:description" content="Compilation curatée d'outils, tips et frameworks pour Claude Code et l'écosystème IA.">
    <meta property="og:url" content="https://sftss.github.io/encyClaupedia/">
    <meta property="og:image" content="Encyclaupedia_logo.webp">
    <meta property="og:image:alt" content="EncyClaupedia">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="EncyClaupedia - Encyclopédie des Outils IA">
    <meta name="twitter:description" content="Compilation curatée d'outils, tips et frameworks pour Claude Code et l'écosystème IA.">
    <meta name="twitter:image" content="Encyclaupedia_logo.webp">
    <meta name="twitter:image:alt" content="Logo EncyClaupedia">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header>
    <div class="header-inner">
        <div class="logo">
            <span class="logo-mark">
                <img src="Encyclaupedia_logo.webp" alt="Logo EncyClaupedia" class="logo-image">
            </span>
            <span class="logo-name">EncyClaupedia</span>
            <span class="logo-sep">/</span>
            <span class="logo-sub">Encyclopédie IA</span>
        </div>
        <div class="search-box">
            <svg class="search-icon" viewBox="0 0 16 16" fill="none">
                <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
                <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input type="search" id="search" placeholder="Rechercher un outil, tip, framework…" autocomplete="off" spellcheck="false">
        </div>
        <div class="header-right">
            <span id="total-count" class="stat-pill">- ressources</span>
        </div>
    </div>
</header>

<!-- LAYOUT -->
<div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-inner">
            <p class="sidebar-label">Catégories</p>
            <nav id="category-nav"></nav>

            <div class="sidebar-divider"></div>

            <p class="sidebar-label">Tags populaires</p>
            <div id="tag-filters" class="tag-filter-list"></div>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
        <div class="content-header">
            <div class="ch-text">
                <h1 id="section-title">Toutes les ressources</h1>
                <p id="section-desc">Compilation d'outils, tips et frameworks pour maximiser votre productivité IA</p>
            </div>
            <span id="results-count" class="results-count"></span>
        </div>
        <div class="cards-grid" id="cards-grid"></div>
    </main>

</div>

<!-- FOOTER -->
<footer>
    <div class="footer-inner">
        <span>EncyClaupedia · Compilation curatée</span>
        <span class="dot">·</span>
        <a href="https://github.com/sftss" target="_blank" rel="noopener">sftss</a>
        <span class="dot">·</span>
        <a href="https://sftss.github.io" target="_blank" rel="noopener">Portfolio</a>
        <span class="dot">·</span>
        <a href="https://github.com/sftss/encyClaupedia" target="_blank" rel="noopener">GitHub</a>
    </div>
</footer>

<script src="script.js"></script>
</body>
</html>
